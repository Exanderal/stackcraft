packages:
  - 'apps/*'
  - 'packages/*' # shared code: graphql types, ui components, etc.
  - 'tools/generators'

allowBuilds:
  '@apollo/protobufjs': true
  '@biomejs/biome': true
  '@nestjs/core': true
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@swc/core': true
  esbuild: true
  nx: true
  prisma: true
  sharp: true
  unrs-resolver: true
